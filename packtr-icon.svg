<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2C1810"/>
      <stop offset="100%" style="stop-color:#1a0e08"/>
    </linearGradient>
    <linearGradient id="leatherB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C4864A"/>
      <stop offset="50%" style="stop-color:#A0622E"/>
      <stop offset="100%" style="stop-color:#7A4520"/>
    </linearGradient>
    <linearGradient id="leatherTopB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D49A5A"/>
      <stop offset="100%" style="stop-color:#A0622E"/>
    </linearGradient>
    <linearGradient id="goldB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5D680"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
    <linearGradient id="checkB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8E87A"/>
      <stop offset="100%" style="stop-color:#C9A84C"/>
    </linearGradient>
    <filter id="dropB">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Rich dark brown background -->
  <rect width="512" height="512" rx="112" fill="url(#bgB)"/>

  <!-- Subtle Art Deco corner lines -->
  <line x1="40" y1="40" x2="100" y2="40" stroke="#C9A84C" stroke-width="2" opacity="0.4"/>
  <line x1="40" y1="40" x2="40" y2="100" stroke="#C9A84C" stroke-width="2" opacity="0.4"/>
  <line x1="472" y1="40" x2="412" y2="40" stroke="#C9A84C" stroke-width="2" opacity="0.4"/>
  <line x1="472" y1="40" x2="472" y2="100" stroke="#C9A84C" stroke-width="2" opacity="0.4"/>
  <line x1="40" y1="472" x2="100" y2="472" stroke="#C9A84C" stroke-width="2" opacity="0.4"/>
  <line x1="40" y1="472" x2="40" y2="412" stroke="#C9A84C" stroke-width="2" opacity="0.4"/>
  <line x1="472" y1="472" x2="412" y2="472" stroke="#C9A84C" stroke-width="2" opacity="0.4"/>
  <line x1="472" y1="472" x2="472" y2="412" stroke="#C9A84C" stroke-width="2" opacity="0.4"/>

  <!-- Suitcase body — warm tan leather -->
  <rect x="80" y="170" width="352" height="252" rx="22" fill="url(#leatherB)" filter="url(#dropB)"/>

  <!-- Leather texture highlight top -->
  <rect x="80" y="170" width="352" height="70" rx="22" fill="url(#leatherTopB)" opacity="0.6"/>

  <!-- Suitcase lid line -->
  <line x1="80" y1="230" x2="432" y2="230" stroke="#7A4520" stroke-width="3" opacity="0.6"/>
  <line x1="80" y1="234" x2="432" y2="234" stroke="#D49A5A" stroke-width="1" opacity="0.3"/>

  <!-- Border trim — gold piping -->
  <rect x="80" y="170" width="352" height="252" rx="22" fill="none" stroke="url(#goldB)" stroke-width="4"/>

  <!-- Side straps — vertical -->
  <rect x="140" y="170" width="22" height="252" rx="0" fill="#7A4520" opacity="0.5"/>
  <rect x="350" y="170" width="22" height="252" rx="0" fill="#7A4520" opacity="0.5"/>
  <line x1="140" y1="170" x2="140" y2="422" stroke="url(#goldB)" stroke-width="1.5" opacity="0.6"/>
  <line x1="162" y1="170" x2="162" y2="422" stroke="url(#goldB)" stroke-width="1.5" opacity="0.6"/>
  <line x1="350" y1="170" x2="350" y2="422" stroke="url(#goldB)" stroke-width="1.5" opacity="0.6"/>
  <line x1="372" y1="170" x2="372" y2="422" stroke="url(#goldB)" stroke-width="1.5" opacity="0.6"/>

  <!-- Strap buckles -->
  <rect x="140" y="276" width="22" height="30" rx="4" fill="url(#goldB)"/>
  <rect x="350" y="276" width="22" height="30" rx="4" fill="url(#goldB)"/>
  <rect x="144" y="280" width="14" height="22" rx="2" fill="#7A4520"/>
  <rect x="354" y="280" width="14" height="22" rx="2" fill="#7A4520"/>
  <rect x="149" y="280" width="4" height="22" rx="2" fill="url(#goldB)"/>
  <rect x="359" y="280" width="4" height="22" rx="2" fill="url(#goldB)"/>

  <!-- Handle base plates -->
  <rect x="188" y="154" width="28" height="26" rx="6" fill="url(#goldB)"/>
  <rect x="296" y="154" width="28" height="26" rx="6" fill="url(#goldB)"/>

  <!-- Handle arch — thick luggage handle style -->
  <path d="M204 164 Q256 106 308 164" fill="none" stroke="url(#goldB)" stroke-width="18" stroke-linecap="round"/>
  <path d="M204 164 Q256 106 308 164" fill="none" stroke="#8a5a1a" stroke-width="8" stroke-linecap="round"/>
  <path d="M204 164 Q256 106 308 164" fill="none" stroke="rgba(255,230,140,0.3)" stroke-width="4" stroke-linecap="round"/>

  <!-- Center lock -->
  <rect x="234" y="260" width="44" height="40" rx="8" fill="url(#goldB)"/>
  <rect x="238" y="264" width="36" height="32" rx="6" fill="#8a5a1a"/>
  <!-- Keyhole -->
  <circle cx="256" cy="276" r="6" fill="url(#goldB)"/>
  <rect x="253" y="280" width="6" height="10" rx="2" fill="url(#goldB)"/>

  <!-- Ornate checkmark — calligraphic, smaller, with curved entry and tapered strokes -->
  <!-- Shadow layer for depth -->
  <path d="M174 318 C180 322 200 344 220 368 C240 344 290 272 358 222"
        fill="none"
        stroke="rgba(80,40,0,0.45)"
        stroke-width="20"
        stroke-linecap="round"
        stroke-linejoin="round"/>
  <!-- Main check stroke — tapered via two overlapping paths -->
  <path d="M174 318 C180 322 200 344 220 368 C240 344 290 272 358 222"
        fill="none"
        stroke="url(#checkB)"
        stroke-width="18"
        stroke-linecap="round"
        stroke-linejoin="round"
        opacity="0.97"/>
  <!-- Thinner inner shine — gives calligraphic taper illusion -->
  <path d="M174 318 C180 322 200 344 220 368 C240 344 290 272 358 222"
        fill="none"
        stroke="rgba(255,250,200,0.5)"
        stroke-width="7"
        stroke-linecap="round"
        stroke-linejoin="round"/>
  <!-- Entry serif — small decorative stroke at the start of the check -->
  <path d="M166 312 C168 310 174 316 174 318"
        fill="none"
        stroke="url(#checkB)"
        stroke-width="10"
        stroke-linecap="round"
        opacity="0.85"/>
  <!-- Exit flourish — small upward curl at the tip -->
  <path d="M358 222 C362 216 366 212 364 208"
        fill="none"
        stroke="url(#checkB)"
        stroke-width="8"
        stroke-linecap="round"
        opacity="0.75"/>
</svg>
